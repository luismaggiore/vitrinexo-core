name: Fix FluentSMTP to Resend
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Update FluentSMTP SMTP config to Resend
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          sudo apt-get install -y sshpass -q
          WP_PATH="${SSH_TARGET%/wp-content/*}"
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=30 \
            -p "$SSH_PORT" \
            "$SSH_USERNAME@$SSH_HOST" \
            "cd '$WP_PATH' && php -r \"
define('ABSPATH', '$WP_PATH/');
define('WPINC', 'wp-includes');
\\\$table_prefix = 'wp_';
require '$WP_PATH/wp-load.php';
\\\$s = get_option('fluentmail-settings', []);
\\\$id = array_key_first(\\\$s['connections']);
\\\$s['connections'][\\\$id]['title'] = 'Resend SMTP';
\\\$s['connections'][\\\$id]['provider_settings'] = ['provider'=>'smtp','sender_name'=>'Vitrinexo','sender_email'=>'hola@vitrinexo.com','force_from_name'=>'no','force_from_email'=>'yes','return_path'=>'yes','host'=>'smtp.resend.com','port'=>'465','auth'=>'yes','username'=>'resend','password'=>'re_BHhLevEe_5Gt2HyPTCEgJYSiJ8rEVdnaF','auto_tls'=>'no','encryption'=>'ssl','key_store'=>'db'];
update_option('fluentmail-settings', \\\$s);
echo 'Updated to: ' . get_option('fluentmail-settings')['connections'][\\\$id]['provider_settings']['host'] . PHP_EOL;
\""
