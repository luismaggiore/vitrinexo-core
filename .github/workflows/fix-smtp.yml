name: Fix FluentSMTP to Resend
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Update FluentSMTP to Resend SMTP
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          sudo apt-get install -y sshpass -q
          WP_PATH="${SSH_TARGET%/wp-content/*}"

          # Write a PHP eval script locally then pipe it to the server
          cat > /tmp/fix_smtp.php << 'PHP'
$s = get_option('fluentmail-settings', []);
$id = array_key_first($s['connections']);
echo "Old host: " . $s['connections'][$id]['provider_settings']['host'] . "\n";
$s['connections'][$id]['title'] = 'Resend SMTP';
$s['connections'][$id]['provider_settings'] = array(
  'provider'         => 'smtp',
  'sender_name'      => 'Vitrinexo',
  'sender_email'     => 'hola@vitrinexo.com',
  'force_from_name'  => 'no',
  'force_from_email' => 'yes',
  'return_path'      => 'yes',
  'host'             => 'smtp.resend.com',
  'port'             => '465',
  'auth'             => 'yes',
  'username'         => 'resend',
  'password'         => 're_BHhLevEe_5Gt2HyPTCEgJYSiJ8rEVdnaF',
  'auto_tls'         => 'no',
  'encryption'       => 'ssl',
  'key_store'        => 'db',
);
update_option('fluentmail-settings', $s);
$v = get_option('fluentmail-settings');
echo "New host: " . $v['connections'][$id]['provider_settings']['host'] . "\n";
echo "Username: " . $v['connections'][$id]['provider_settings']['username'] . "\n";
echo "Done OK\n";
PHP

          # Copy file to server
          sshpass -p "$SSH_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -P "$SSH_PORT" \
            /tmp/fix_smtp.php \
            "$SSH_USERNAME@$SSH_HOST:/tmp/fix_smtp.php"

          # Run it with WP-CLI
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=30 \
            -p "$SSH_PORT" \
            "$SSH_USERNAME@$SSH_HOST" \
            "cd '$WP_PATH' && wp eval-file /tmp/fix_smtp.php --allow-root && rm /tmp/fix_smtp.php"
