name: Fix FluentSMTP to Resend
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Update FluentSMTP to Resend SMTP
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
          PHP_B64: ""
        run: |
          sudo apt-get install -y sshpass -q
          WP_PATH="${SSH_TARGET%/wp-content/*}"
          printf '%s' "$PHP_B64" | base64 -d > /tmp/fix_smtp.php
          echo "=== PHP starts with: ===" && head -1 /tmp/fix_smtp.php
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -P "$SSH_PORT" /tmp/fix_smtp.php "$SSH_USERNAME@$SSH_HOST:/tmp/fix_smtp.php"
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -o ConnectTimeout=30 -p "$SSH_PORT" "$SSH_USERNAME@$SSH_HOST" "cd '$WP_PATH' && wp eval-file /tmp/fix_smtp.php --allow-root 2>&1; echo exit:$?; rm /tmp/fix_smtp.php"
