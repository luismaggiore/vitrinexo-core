name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Test SSH connection
        run: |
          echo "Checking SSH variables..."
          test -n "$SSH_HOST" || (echo "SSH_HOST is empty" && exit 1)
          test -n "$SSH_PORT" || (echo "SSH_PORT is empty" && exit 1)
          test -n "$SSH_USERNAME" || (echo "SSH_USERNAME is empty" && exit 1)
          test -n "$SSH_PASSWORD" || (echo "SSH_PASSWORD is empty" && exit 1)

          echo "SSH_HOST length: ${#SSH_HOST}"
          echo "SSH_PORT: $SSH_PORT"
          echo "SSH_USERNAME: $SSH_USERNAME"

          sudo apt-get update
          sudo apt-get install -y sshpass

          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -p "$SSH_PORT" \
            "$SSH_USERNAME@$SSH_HOST" \
            "pwd && ls -la"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}

      - name: Deploy via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: ${{ secrets.SSH_TARGET }}
          rm: true
          debug: true

      - name: Purge WordPress cache via WP-CLI
        run: |
          sudo apt-get install -y sshpass

          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -p "$SSH_PORT" \
            "$SSH_USERNAME@$SSH_HOST" \
            "
              WP_PATH=\$(find ~ -maxdepth 5 -name 'wp-config.php' 2>/dev/null | head -1 | xargs -I{} dirname {})
              if [ -z \"\$WP_PATH\" ]; then
                echo 'wp-config.php not found, skipping cache purge'
                exit 0
              fi
              echo \"WordPress encontrado en: \$WP_PATH\"
              cd \"\$WP_PATH\"
              wp cache flush --allow-root && echo 'Object cache flushed.' || true
              wp litespeed-purge all --allow-root 2>/dev/null && echo 'LiteSpeed cache purged.' || true
              echo 'Done.'
            "
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
