name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy y purge de caché
        run: |
          echo "Checking SSH variables..."
          test -n "$SSH_HOST" || (echo "SSH_HOST is empty" && exit 1)
          test -n "$SSH_PORT" || (echo "SSH_PORT is empty" && exit 1)
          test -n "$SSH_USERNAME" || (echo "SSH_USERNAME is empty" && exit 1)
          test -n "$SSH_PASSWORD" || (echo "SSH_PASSWORD is empty" && exit 1)
          test -n "$SSH_TARGET" || (echo "SSH_TARGET is empty" && exit 1)

          sudo apt-get update -qq
          sudo apt-get install -y sshpass rsync

          echo "=== Desplegando archivos via rsync ==="
          sshpass -p "$SSH_PASSWORD" rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -p $SSH_PORT" \
            ./ \
            "$SSH_USERNAME@$SSH_HOST:$SSH_TARGET/"

          echo "=== Purgando caché de WordPress ==="
          # WP root está 3 niveles arriba de .../wp-content/plugins/vitrinexo-core
          WP_PATH="${SSH_TARGET%/wp-content/*}"

          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=30 \
            -p "$SSH_PORT" \
            "$SSH_USERNAME@$SSH_HOST" \
            "cd '$WP_PATH' && \
             wp cache flush --allow-root && echo 'Object cache flushed.' || true && \
             wp litespeed-purge all --allow-root 2>/dev/null && echo 'LiteSpeed cache purged.' || true && \
             echo 'Caché purgado correctamente.'"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
