name: Setup Resend
on: workflow_dispatch
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set Resend API key in WordPress
        run: |
          sudo apt-get install -y sshpass -q
          WP_PATH="${SSH_TARGET%/wp-content/*}"
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no -o ConnectTimeout=30 -p "$SSH_PORT" \
            "$SSH_USERNAME@$SSH_HOST" \
            "cd '$WP_PATH' && \
             wp option update vx_resend_api_key 're_R6Pe1fAY_DZwWzhayRZgYv6Kmu1XG3TNt' --allow-root && \
             echo 'API key guardada' && \
             wp eval 'var_dump(wp_mail(\"joao@vitrinexo.com\",\"Test Resend\",\"Prueba desde Resend via SMTP\"));' --allow-root"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
