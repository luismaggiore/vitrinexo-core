name: SMTP Diagnostic
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check SMTP config
        run: |
          sudo apt-get install -y sshpass -q
          WP_PATH="${SSH_TARGET%/wp-content/*}"
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no -o ConnectTimeout=30 -p "$SSH_PORT" \
            "$SSH_USERNAME@$SSH_HOST" \
            "cd '$WP_PATH' && \
             echo '=== SMTP plugins activos ===' && \
             wp plugin list --status=active --allow-root 2>/dev/null | grep -i 'smtp\|mail\|fluent\|postmark\|wp-mail' || echo 'Ningún plugin SMTP activo' && \
             echo '=== Test wp_mail ===' && \
             wp eval 'echo wp_mail(\"joao@vitrinexo.com\",\"Test WP Mail Vitrinexo\",\"Test\") ? \"OK\" : \"FALLO\";' --allow-root 2>/dev/null && \
             echo '=== PHP mail() disponible ===' && \
             wp eval 'echo function_exists(\"mail\") ? \"si\" : \"no\";' --allow-root 2>/dev/null"
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
