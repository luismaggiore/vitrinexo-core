name: Site Maintenance
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'WP-CLI command'
        required: true
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
          WP_CMD: ${{ github.event.inputs.command }}
        run: |
          sudo apt-get install -y sshpass -q
          WP_PATH="${SSH_TARGET%/wp-content/*}"
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -o ConnectTimeout=30 -p "$SSH_PORT" "$SSH_USERNAME@$SSH_HOST" "cd '$WP_PATH' && wp $WP_CMD --allow-root 2>&1"
