name: Site Maintenance
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PHP_SCRIPT: ""
    steps:
      - name: Send test emails
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET: ${{ secrets.SSH_TARGET }}
        run: |
          sudo apt-get install -y sshpass -q
          WP_PATH="${SSH_TARGET%/wp-content/*}"
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=30 \
            -p "$SSH_PORT" \
            "$SSH_USERNAME@$SSH_HOST" \
            "printf '%s' '$PHP_SCRIPT' | base64 -d > /tmp/vx_test.php && cd '$WP_PATH' && wp eval-file /tmp/vx_test.php --allow-root 2>&1"
